substitutions:
  _REGION: asia-southeast2
  _PROJECT: YOUR_DEV_PROJECT_ID  # override via --substitutions="_PROJECT=..." on submit
  _REGISTRY: asia-southeast2-docker.pkg.dev
  _REPO: tring-service

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-pipeline
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:$COMMIT_SHA
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:latest
      - .

  - name: "gcr.io/cloud-builders/docker"
    id: push-pipeline
    args: ["push", "--all-tags", "${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline"]
    waitFor: ["build-pipeline"]

  # All 5 jobs use the same single image. Each job sets --command and --args
  # to override the default CMD (HTTP health check server for Cloud Run Service).
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-appsflyer-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-appsflyer
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:$COMMIT_SHA
      - --command=python
      - --args=-m,tring_ingest,--source,appsflyer
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-pipeline"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-moengage-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-moengage
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:$COMMIT_SHA
      - --command=python
      - --args=-m,tring_ingest,--source,moengage
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-pipeline"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-play-console-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-play-console
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:$COMMIT_SHA
      - --command=python
      - --args=-m,tring_ingest,--source,play_console
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-pipeline"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-app-store-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-app-store
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:$COMMIT_SHA
      - --command=python
      - --args=-m,tring_ingest,--source,app_store
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-pipeline"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-dbt-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - dbt-transform
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/pipeline:$COMMIT_SHA
      - --command=dbt
      - --args=build,--project-dir,/app/transform,--target,prod,--target-path,/tmp/dbt-target
      - --update-env-vars=DBT_PROFILES_DIR=/app/transform
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-pipeline"]

options:
  logging: CLOUD_LOGGING_ONLY
