substitutions:
  _ENV: prod
  _REGION: asia-southeast2
  _PROJECT: CLIENT_GCP_PROJECT  # set by client  -  override via Cloud Build substitution
  _REGISTRY: asia-southeast2-docker.pkg.dev
  _REPO: tring-service

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-ingestion
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/ingestion:$COMMIT_SHA
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/ingestion:latest
      - ingestion/

  - name: "gcr.io/cloud-builders/docker"
    id: build-dbt
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/dbt:$COMMIT_SHA
      - -t
      - ${_REGISTRY}/${_PROJECT}/${_REPO}/dbt:latest
      - transform/

  - name: "gcr.io/cloud-builders/docker"
    id: push-ingestion
    args: ["push", "--all-tags", "${_REGISTRY}/${_PROJECT}/${_REPO}/ingestion"]
    waitFor: ["build-ingestion"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-dbt
    args: ["push", "--all-tags", "${_REGISTRY}/${_PROJECT}/${_REPO}/dbt"]
    waitFor: ["build-dbt"]

  # Cloud Run Jobs, Workflow, and Scheduler are provisioned once via gcloud
  # (docs/gcp-setup.md steps 8-10). Cloud Build only rolls the new image onto the
  # existing jobs on each push. No Terraform in the deploy path.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-appsflyer-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-appsflyer
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/ingestion:$COMMIT_SHA
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-ingestion"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-moengage-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-moengage
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/ingestion:$COMMIT_SHA
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-ingestion"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-play-console-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - extract-play-console
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/ingestion:$COMMIT_SHA
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-ingestion"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-dbt-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - dbt-transform
      - --image=${_REGISTRY}/${_PROJECT}/${_REPO}/dbt:$COMMIT_SHA
      - --region=${_REGION}
      - --project=${_PROJECT}
    waitFor: ["push-dbt"]

options:
  logging: CLOUD_LOGGING_ONLY
