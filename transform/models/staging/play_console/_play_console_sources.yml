version: 2

sources:
  - name: play_raw
    database: "{{ env_var('GCP_PROJECT') }}"
    schema: play_raw
    tables:
      - name: raw_crash_rate
        description: "Verbatim crash rate metric rows from Play Developer Reporting API. All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_anr_rate
        description: "Verbatim ANR rate metric rows from Play Developer Reporting API. All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_stuck_bg_wakelock_rate
        description: "Verbatim stuck background wakelock rate metric rows. All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_excessive_wakeup_rate
        description: "Verbatim excessive wakeup rate metric rows. All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_error_count
        description: "Verbatim error/ANR count rows. Includes reportType dimension (API requirement). All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_slow_start_rate
        description: "Verbatim slow start rate metric rows. Includes startType dimension. All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_reviews
        description: "Verbatim user review rows from Android Publisher API. All fields STRING."
        freshness:
          warn_after: {count: 73, period: hour}
          error_after: {count: 97, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_gcs_installs
        description: "Verbatim install/uninstall rows from GCS stats/installs/*_overview.csv. All fields STRING."
        freshness:
          warn_after: {count: 193, period: hour}
          error_after: {count: 217, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_gcs_crashes
        description: "Verbatim daily crash/ANR count rows from GCS stats/crashes/*_overview.csv. All fields STRING."
        freshness:
          warn_after: {count: 193, period: hour}
          error_after: {count: 217, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_gcs_store_performance_country
        description: "Store listing performance by country from GCS stats/store_performance/*_country.csv. All fields STRING."
        freshness:
          warn_after: {count: 193, period: hour}
          error_after: {count: 217, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_gcs_store_performance_traffic
        description: "Store listing performance by traffic source from GCS stats/store_performance/*_traffic_source.csv. All fields STRING."
        freshness:
          warn_after: {count: 193, period: hour}
          error_after: {count: 217, period: hour}
        loaded_at_field: _ingested_at
