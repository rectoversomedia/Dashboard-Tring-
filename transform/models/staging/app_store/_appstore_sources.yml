version: 2

sources:
  - name: appstore_raw
    database: "{{ env_var('GCP_PROJECT') }}"
    schema: appstore_raw
    tables:
      - name: raw_reviews
        description: "Verbatim customer review rows from App Store Connect customerReviews API. All fields STRING."
        freshness:
          warn_after: {count: 49, period: hour}
          error_after: {count: 73, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_app_downloads
        description: "Verbatim rows from App Downloads Standard analytics report. All fields STRING."
        freshness:
          warn_after: {count: 49, period: hour}
          error_after: {count: 73, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_app_installs_deletions
        description: "Verbatim rows from App Store Installation and Deletion Standard analytics report. All fields STRING."
        freshness:
          warn_after: {count: 49, period: hour}
          error_after: {count: 73, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_app_sessions
        description: "Verbatim rows from App Sessions Standard analytics report. All fields STRING."
        freshness:
          warn_after: {count: 49, period: hour}
          error_after: {count: 73, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_app_discovery_engagement
        description: "Verbatim rows from App Store Discovery and Engagement Standard analytics report. All fields STRING."
        freshness:
          warn_after: {count: 49, period: hour}
          error_after: {count: 73, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_app_install_performance
        description: "Verbatim rows from App Install Performance analytics report. All fields STRING."
        freshness:
          warn_after: {count: 49, period: hour}
          error_after: {count: 73, period: hour}
        loaded_at_field: _ingested_at
