version: 2

models:
  - name: stg_appsflyer_installs
    description: "Typed, deduped installs. One row per appsflyer_id per install_date per platform."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: stg_appsflyer_installs_unique_key
          combination_of_columns: ["appsflyer_id", "install_date", "_platform"]
    columns:
      - name: appsflyer_id
        data_tests:
          - not_null
      - name: install_date
        data_tests:
          - not_null
      - name: media_source
        data_tests:
          - not_null
      - name: platform
        data_tests:
          - not_null
      - name: _platform
        data_tests:
          - not_null
          - accepted_values:
              values: ["android", "ios"]

  - name: stg_appsflyer_in_app_events
    description: "Typed in-app events with event category mapped from seed."
    columns:
      - name: appsflyer_id
        data_tests:
          - not_null
      - name: event_name
        data_tests:
          - not_null
      - name: event_date
        data_tests:
          - not_null
      - name: event_category
        data_tests:
          - accepted_values:
              values: ["open_app", "login", "purchase", "registrations"]
              config:
                severity: warn
      - name: _platform
        data_tests:
          - not_null
          - accepted_values:
              values: ["android", "ios"]

  - name: stg_appsflyer_blocked_installs
    description: "Typed, deduped blocked installs."
    columns:
      - name: appsflyer_id
        data_tests:
          - not_null
      - name: install_date
        data_tests:
          - not_null
      - name: blocked_reason
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: _platform
        data_tests:
          - not_null
          - accepted_values:
              values: ["android", "ios"]

  - name: stg_appsflyer_campaign_performance
    description: "Typed campaign performance from master-agg-data."
    columns:
      - name: date
        data_tests:
          - not_null
      - name: media_source
        data_tests:
          - not_null
      - name: impressions
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: clicks
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: installs
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: cost
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                severity: warn
      - name: _platform
        data_tests:
          - not_null
          - accepted_values:
              values: ["android", "ios"]
