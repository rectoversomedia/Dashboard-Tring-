version: 2

sources:
  - name: moengage_raw
    database: "{{ env_var('GCP_PROJECT') }}"
    schema: moengage_raw
    tables:
      - name: raw_campaigns
        description: "Verbatim campaign list from MoEngage /campaigns/search. All fields STRING."
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: _ingested_at

      - name: raw_campaign_stats
        description: "Verbatim flattened campaign stats from MoEngage /campaign-stats. One row per campaign x platform x locale x variation."
        freshness:
          warn_after: {count: 25, period: hour}
          error_after: {count: 49, period: hour}
        loaded_at_field: _ingested_at
