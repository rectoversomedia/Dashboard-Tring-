name: tring_transform
version: "1.0.0"
config-version: 2

profile: tring_transform

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  tring_transform:
    staging:
      +materialized: view
      +schema: staging
      appsflyer:
        +tags: ["appsflyer", "staging"]
      moengage:
        +tags: ["moengage", "staging"]
        +schema: moengage_staging
      play_console:
        +tags: ["play_console", "staging"]
        +schema: play_staging
      app_store:
        +tags: ["app_store", "staging"]
        +schema: appstore_staging
    marts:
      +materialized: table
      +schema: mart
      appsflyer:
        +tags: ["appsflyer", "mart"]
        mart_appsflyer_install_attribution:
          +partition_by:
            field: install_date
            data_type: date
          +cluster_by: ["media_source", "campaign", "platform"]
        mart_appsflyer_campaign_performance:
          +partition_by:
            field: date
            data_type: date
          +cluster_by: ["media_source", "campaign", "platform"]
        mart_appsflyer_user_quality:
          +partition_by:
            field: date
            data_type: date
          +cluster_by: ["media_source", "campaign", "platform"]
        mart_appsflyer_retention:
          +partition_by:
            field: cohort_date
            data_type: date
          +cluster_by: ["media_source", "campaign", "platform"]
        mart_appsflyer_fraud:
          +partition_by:
            field: date
            data_type: date
          +cluster_by: ["media_source", "campaign", "platform"]
      moengage:
        +tags: ["moengage", "mart"]
        +schema: moengage_mart
        mart_moengage_push:
          +partition_by:
            field: stats_date_from
            data_type: date
          +cluster_by: ["platform", "channel"]
        mart_moengage_campaign_analytics:
          +partition_by:
            field: stats_date_from
            data_type: date
          +cluster_by: ["platform", "channel"]
      play_console:
        +tags: ["play_console", "mart"]
        +schema: play_mart
        mart_play_console_app_health:
          +partition_by:
            field: date
            data_type: date
          +cluster_by: ["version_code"]
        mart_play_console_reviews:
          +partition_by:
            field: review_date
            data_type: date
          +cluster_by: ["star_rating"]
        mart_play_console_gcs_stats:
          +partition_by:
            field: date
            data_type: date
          +cluster_by: ["platform"]
      app_store:
        +tags: ["app_store", "mart"]
        +schema: appstore_mart
        mart_appstore_acquisition:
          +partition_by:
            field: date
            data_type: date
        mart_appstore_engagement:
          +partition_by:
            field: date
            data_type: date
        mart_appstore_reviews:
          +partition_by:
            field: review_date
            data_type: date
          +cluster_by: ["rating"]

    dashboard:
      +materialized: table
      +schema: dashboard
      +tags: ["dashboard"]
      +partition_by:
        field: date
        data_type: date
      dash_ratings_daily:
        +cluster_by: ["platform"]
      dash_rating_distribution:
        +partition_by: null
        +cluster_by: ["platform", "rating"]
      dash_acquisition_by_app_version:
        +cluster_by: ["platform", "app_version"]
      dash_acquisition_by_os_version:
        +cluster_by: ["platform", "os_version"]
      dash_acquisition_by_device:
        +cluster_by: ["platform", "device"]
      dash_overview_android:
        +cluster_by: ["platform"]
      dash_overview_ios:
        +cluster_by: ["platform"]

seeds:
  tring_transform:
    +schema: staging
