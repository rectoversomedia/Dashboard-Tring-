main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-southeast2"
          - extract_job: "extract-appsflyer"
          - dbt_job: "dbt-transform"

    - resolve_dates:
        switch:
          - condition: ${("date_from" in args) and ("date_to" in args)}
            steps:
              - use_input_dates:
                  assign:
                    - date_from: ${args.date_from}
                    - date_to: ${args.date_to}
          - condition: true
            steps:
              - compute_yesterday:
                  assign:
                    - yesterday_unix: ${sys.now() - 86400}
                    - date_from: ${text.substring(time.format(yesterday_unix), 0, 10)}
                    - date_to: ${text.substring(time.format(yesterday_unix), 0, 10)}

    - build_extract_body:
        assign:
          - extract_body:
              overrides:
                containerOverrides:
                  - env:
                      - name: DATE_FROM
                        value: ${date_from}
                      - name: DATE_TO
                        value: ${date_to}

    - run_extract_appsflyer:
        try:
          call: http.post
          args:
            url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/" + extract_job + ":run"}
            auth:
              type: OAuth2
            body: ${extract_body}
          result: appsflyer_result
        except:
          as: e
          steps:
            - fail_appsflyer:
                raise: ${"extract-appsflyer failed"}

    - run_dbt:
        try:
          call: http.post
          args:
            url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/" + dbt_job + ":run"}
            auth:
              type: OAuth2
            body: {}
          result: dbt_result
        except:
          as: e
          steps:
            - fail_dbt:
                raise: ${"dbt-transform failed"}

    - done:
        return: ${"Pipeline complete for " + date_from + " to " + date_to}
