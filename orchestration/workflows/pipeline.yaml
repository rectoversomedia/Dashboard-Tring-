main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: "asia-southeast2"
          - dbt_job: "dbt-transform"

    - resolve_dates:
        switch:
          - condition: ${args != null and "date_from" in args and "date_to" in args}
            steps:
              - use_input_dates:
                  assign:
                    - date_from: ${args.date_from}
                    - date_to: ${args.date_to}
          - condition: true
            steps:
              - compute_yesterday:
                  assign:
                    - three_days_ago_unix: ${sys.now() - 259200}
                    - four_days_ago_unix: ${sys.now() - 345600}
                    - date_from: ${text.substring(time.format(four_days_ago_unix), 0, 10)}
                    - date_to: ${text.substring(time.format(three_days_ago_unix), 0, 10)}

    - build_extract_body:
        assign:
          - extract_body:
              overrides:
                containerOverrides:
                  - env:
                      - name: DATE_FROM
                        value: ${date_from}
                      - name: DATE_TO
                        value: ${date_to}

    - run_extracts_parallel:
        parallel:
          branches:
            - appsflyer_branch:
                steps:
                  - run_extract_appsflyer:
                      try:
                        call: http.post
                        args:
                          url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/extract-appsflyer:run"}
                          auth:
                            type: OAuth2
                          body: ${extract_body}
                        result: appsflyer_result
                      except:
                        as: e
                        steps:
                          - fail_appsflyer_start:
                              raise: "extract-appsflyer failed to start"

                  - get_appsflyer_execution:
                      assign:
                        - appsflyer_execution: ${appsflyer_result.body.metadata.name}

                  - wait_for_appsflyer:
                      steps:
                        - poll_appsflyer:
                            call: http.get
                            args:
                              url: ${"https://run.googleapis.com/v2/" + appsflyer_execution}
                              auth:
                                type: OAuth2
                            result: appsflyer_poll
                        - check_appsflyer_state:
                            switch:
                              - condition: ${"reconciling" in appsflyer_poll.body and appsflyer_poll.body.reconciling == true}
                                steps:
                                  - sleep_appsflyer_reconciling:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_appsflyer_reconciling:
                                      next: poll_appsflyer
                              - condition: ${appsflyer_poll.body.conditions[0].state == "CONDITION_SUCCEEDED" and "succeededCount" in appsflyer_poll.body and appsflyer_poll.body.succeededCount == appsflyer_poll.body.taskCount}
                                next: appsflyer_done
                              - condition: ${appsflyer_poll.body.conditions[0].state == "CONDITION_SUCCEEDED"}
                                steps:
                                  - fail_appsflyer_partial:
                                      raise: "extract-appsflyer completed but not all tasks succeeded"
                              - condition: ${appsflyer_poll.body.conditions[0].state == "CONDITION_FAILED"}
                                steps:
                                  - fail_appsflyer_execution:
                                      raise: "extract-appsflyer execution failed"
                              - condition: true
                                steps:
                                  - sleep_appsflyer:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_appsflyer:
                                      next: poll_appsflyer
                        - appsflyer_done:
                            assign:
                              - appsflyer_status: "succeeded"

            - play_console_branch:
                steps:
                  - run_extract_play_console:
                      try:
                        call: http.post
                        args:
                          url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/extract-play-console:run"}
                          auth:
                            type: OAuth2
                          body: ${extract_body}
                        result: play_console_result
                      except:
                        as: e
                        steps:
                          - fail_play_console_start:
                              raise: "extract-play-console failed to start"

                  - get_play_console_execution:
                      assign:
                        - play_console_execution: ${play_console_result.body.metadata.name}

                  - wait_for_play_console:
                      steps:
                        - poll_play_console:
                            call: http.get
                            args:
                              url: ${"https://run.googleapis.com/v2/" + play_console_execution}
                              auth:
                                type: OAuth2
                            result: play_console_poll
                        - check_play_console_state:
                            switch:
                              - condition: ${"reconciling" in play_console_poll.body and play_console_poll.body.reconciling == true}
                                steps:
                                  - sleep_play_console_reconciling:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_play_console_reconciling:
                                      next: poll_play_console
                              - condition: ${play_console_poll.body.conditions[0].state == "CONDITION_SUCCEEDED" and "succeededCount" in play_console_poll.body and play_console_poll.body.succeededCount == play_console_poll.body.taskCount}
                                next: play_console_done
                              - condition: ${play_console_poll.body.conditions[0].state == "CONDITION_SUCCEEDED"}
                                steps:
                                  - fail_play_console_partial:
                                      raise: "extract-play-console completed but not all tasks succeeded"
                              - condition: ${play_console_poll.body.conditions[0].state == "CONDITION_FAILED"}
                                steps:
                                  - fail_play_console_execution:
                                      raise: "extract-play-console execution failed"
                              - condition: true
                                steps:
                                  - sleep_play_console:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_play_console:
                                      next: poll_play_console
                        - play_console_done:
                            assign:
                              - play_console_status: "succeeded"

            - app_store_branch:
                steps:
                  - run_extract_app_store:
                      try:
                        call: http.post
                        args:
                          url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/extract-app-store:run"}
                          auth:
                            type: OAuth2
                          body: ${extract_body}
                        result: app_store_result
                      except:
                        as: e
                        steps:
                          - fail_app_store_start:
                              raise: "extract-app-store failed to start"

                  - get_app_store_execution:
                      assign:
                        - app_store_execution: ${app_store_result.body.metadata.name}

                  - wait_for_app_store:
                      steps:
                        - poll_app_store:
                            call: http.get
                            args:
                              url: ${"https://run.googleapis.com/v2/" + app_store_execution}
                              auth:
                                type: OAuth2
                            result: app_store_poll
                        - check_app_store_state:
                            switch:
                              - condition: ${"reconciling" in app_store_poll.body and app_store_poll.body.reconciling == true}
                                steps:
                                  - sleep_app_store_reconciling:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_app_store_reconciling:
                                      next: poll_app_store
                              - condition: ${app_store_poll.body.conditions[0].state == "CONDITION_SUCCEEDED" and "succeededCount" in app_store_poll.body and app_store_poll.body.succeededCount == app_store_poll.body.taskCount}
                                next: app_store_done
                              - condition: ${app_store_poll.body.conditions[0].state == "CONDITION_SUCCEEDED"}
                                steps:
                                  - fail_app_store_partial:
                                      raise: "extract-app-store completed but not all tasks succeeded"
                              - condition: ${app_store_poll.body.conditions[0].state == "CONDITION_FAILED"}
                                steps:
                                  - fail_app_store_execution:
                                      raise: "extract-app-store execution failed"
                              - condition: true
                                steps:
                                  - sleep_app_store:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_app_store:
                                      next: poll_app_store
                        - app_store_done:
                            assign:
                              - app_store_status: "succeeded"

            - moengage_branch:
                steps:
                  - run_extract_moengage:
                      try:
                        call: http.post
                        args:
                          url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/extract-moengage:run"}
                          auth:
                            type: OAuth2
                          body: ${extract_body}
                        result: moengage_result
                      except:
                        as: e
                        steps:
                          - fail_moengage_start:
                              raise: "extract-moengage failed to start"

                  - get_moengage_execution:
                      assign:
                        - moengage_execution: ${moengage_result.body.metadata.name}

                  - wait_for_moengage:
                      steps:
                        - poll_moengage:
                            call: http.get
                            args:
                              url: ${"https://run.googleapis.com/v2/" + moengage_execution}
                              auth:
                                type: OAuth2
                            result: moengage_poll
                        - check_moengage_state:
                            switch:
                              - condition: ${"reconciling" in moengage_poll.body and moengage_poll.body.reconciling == true}
                                steps:
                                  - sleep_moengage_reconciling:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_moengage_reconciling:
                                      next: poll_moengage
                              - condition: ${moengage_poll.body.conditions[0].state == "CONDITION_SUCCEEDED" and "succeededCount" in moengage_poll.body and moengage_poll.body.succeededCount == moengage_poll.body.taskCount}
                                next: moengage_done
                              - condition: ${moengage_poll.body.conditions[0].state == "CONDITION_SUCCEEDED"}
                                steps:
                                  - fail_moengage_partial:
                                      raise: "extract-moengage completed but not all tasks succeeded"
                              - condition: ${moengage_poll.body.conditions[0].state == "CONDITION_FAILED"}
                                steps:
                                  - fail_moengage_execution:
                                      raise: "extract-moengage execution failed"
                              - condition: true
                                steps:
                                  - sleep_moengage:
                                      call: sys.sleep
                                      args:
                                        seconds: 15
                                  - retry_moengage:
                                      next: poll_moengage
                        - moengage_done:
                            assign:
                              - moengage_status: "succeeded"

    - run_dbt:
        try:
          call: http.post
          args:
            url: ${"https://run.googleapis.com/v2/projects/" + project + "/locations/" + region + "/jobs/" + dbt_job + ":run"}
            auth:
              type: OAuth2
            body: {}
          result: dbt_result
        except:
          as: e
          steps:
            - fail_dbt:
                raise: "dbt-transform failed to start"

    - get_dbt_execution_name:
        assign:
          - dbt_execution: ${dbt_result.body.metadata.name}

    - wait_for_dbt:
        steps:
          - poll_dbt:
              call: http.get
              args:
                url: ${"https://run.googleapis.com/v2/" + dbt_execution}
                auth:
                  type: OAuth2
              result: dbt_poll_result
          - check_dbt_state:
              switch:
                - condition: ${"reconciling" in dbt_poll_result.body and dbt_poll_result.body.reconciling == true}
                  steps:
                    - sleep_dbt_reconciling:
                        call: sys.sleep
                        args:
                          seconds: 15
                    - retry_dbt_reconciling:
                        next: poll_dbt
                - condition: ${dbt_poll_result.body.conditions[0].state == "CONDITION_SUCCEEDED" and "succeededCount" in dbt_poll_result.body and dbt_poll_result.body.succeededCount == dbt_poll_result.body.taskCount}
                  next: done
                - condition: ${dbt_poll_result.body.conditions[0].state == "CONDITION_SUCCEEDED"}
                  steps:
                    - fail_dbt_partial:
                        raise: "dbt-transform completed but not all tasks succeeded"
                - condition: ${dbt_poll_result.body.conditions[0].state == "CONDITION_FAILED"}
                  steps:
                    - fail_dbt_execution:
                        raise: "dbt-transform execution failed"
                - condition: true
                  steps:
                    - sleep_before_dbt_retry:
                        call: sys.sleep
                        args:
                          seconds: 15
                    - retry_dbt_poll:
                        next: poll_dbt

    - done:
        return: ${"Pipeline complete for " + date_from + " to " + date_to}
